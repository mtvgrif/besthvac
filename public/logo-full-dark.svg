<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&amp;family=Roboto+Condensed:wght@400;700&amp;display=swap');
    </style>
  </defs>
  
  <!-- Dark background for visibility -->
  <rect width="400" height="500" fill="#0A0A0A" rx="12"/>
  
  <!-- === SUN (positioned behind and to the right of snowflake) === -->
  <g transform="translate(215, 170)">
    <!-- Sun body -->
    <circle cx="0" cy="0" r="36" fill="#F2C218"/>
    
    <!-- Sun rays - 8 pointed rays -->
    <!-- Top -->
    <polygon points="-6,-38 0,-68 6,-38" fill="#F2C218"/>
    <circle cx="0" cy="-66" r="6" fill="#F2C218"/>
    <!-- Top-right -->
    <polygon points="23,-31 46,-52 31,-23" fill="#F2C218"/>
    <circle cx="46" cy="-50" r="6" fill="#F2C218"/>
    <!-- Right -->
    <polygon points="38,-6 68,0 38,6" fill="#F2C218"/>
    <circle cx="66" cy="0" r="6" fill="#F2C218"/>
    <!-- Bottom-right -->
    <polygon points="31,23 52,46 23,31" fill="#F2C218"/>
    <circle cx="50" cy="46" r="6" fill="#F2C218"/>
    <!-- Bottom -->
    <polygon points="6,38 0,68 -6,38" fill="#F2C218"/>
    <circle cx="0" cy="66" r="6" fill="#F2C218"/>
    <!-- Bottom-left -->
    <polygon points="-23,31 -46,52 -31,23" fill="#F2C218"/>
    <circle cx="-46" cy="50" r="6" fill="#F2C218"/>
    <!-- Left -->
    <polygon points="-38,6 -68,0 -38,-6" fill="#F2C218"/>
    <circle cx="-66" cy="0" r="6" fill="#F2C218"/>
    <!-- Top-left -->
    <polygon points="-31,-23 -52,-46 -23,-31" fill="#F2C218"/>
    <circle cx="-50" cy="-46" r="6" fill="#F2C218"/>
  </g>
  
  <!-- === SNOWFLAKE (in front, offset left and slightly up) === -->
  <g transform="translate(185, 158)" fill="#00B4D8" stroke="#00B4D8" stroke-width="0.5">
    <!-- Center hexagon -->
    <circle cx="0" cy="0" r="10" fill="#00B4D8"/>
    
    <!-- 6 main arms -->
    <g id="arm">
      <!-- Main arm shaft -->
      <rect x="-3.5" y="-62" width="7" height="62" rx="2"/>
      <!-- Branch pair at 1/3 -->
      <line x1="0" y1="-22" x2="16" y2="-38" stroke="#00B4D8" stroke-width="6" stroke-linecap="round"/>
      <line x1="0" y1="-22" x2="-16" y2="-38" stroke="#00B4D8" stroke-width="6" stroke-linecap="round"/>
      <!-- Branch pair at 2/3 -->
      <line x1="0" y1="-42" x2="12" y2="-54" stroke="#00B4D8" stroke-width="5" stroke-linecap="round"/>
      <line x1="0" y1="-42" x2="-12" y2="-54" stroke="#00B4D8" stroke-width="5" stroke-linecap="round"/>
      <!-- Diamond tip -->
      <polygon points="0,-72 8,-62 0,-52 -8,-62"/>
    </g>
    
    <!-- Rotate the arm 6 times -->
    <use href="#arm" transform="rotate(60)"/>
    <use href="#arm" transform="rotate(120)"/>
    <use href="#arm" transform="rotate(180)"/>
    <use href="#arm" transform="rotate(240)"/>
    <use href="#arm" transform="rotate(300)"/>
  </g>
  
  <!-- === TEXT === -->
  <text x="200" y="308" font-family="'Oswald', 'Arial Black', sans-serif" font-weight="700" font-size="78" fill="#FFFFFF" text-anchor="middle" letter-spacing="5">BEST</text>
  
  <text x="200" y="350" font-family="'Roboto Condensed', 'Arial Narrow', sans-serif" font-weight="700" font-size="32" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">TECHNICAL INC.</text>
  
  <!-- Gold divider -->
  <line x1="115" y1="366" x2="285" y2="366" stroke="#F2C218" stroke-width="2"/>
  
  <text x="200" y="390" font-family="'Roboto Condensed', 'Arial Narrow', sans-serif" font-weight="400" font-size="14.5" fill="#AAAAAA" text-anchor="middle" letter-spacing="3.5">PROFESSIONAL HVAC SERVICES</text>
</svg>
