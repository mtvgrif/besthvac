<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- === SUN (behind, offset right and down) === -->
  <g transform="translate(115, 108)">
    <circle cx="0" cy="0" r="34" fill="#F2C218"/>
    <!-- 8 rays -->
    <polygon points="-5,-36 0,-62 5,-36" fill="#F2C218"/>
    <circle cx="0" cy="-60" r="5.5" fill="#F2C218"/>
    <polygon points="21,-29 42,-48 29,-21" fill="#F2C218"/>
    <circle cx="42" cy="-46" r="5.5" fill="#F2C218"/>
    <polygon points="36,-5 62,0 36,5" fill="#F2C218"/>
    <circle cx="60" cy="0" r="5.5" fill="#F2C218"/>
    <polygon points="29,21 48,42 21,29" fill="#F2C218"/>
    <circle cx="46" cy="42" r="5.5" fill="#F2C218"/>
    <polygon points="5,36 0,62 -5,36" fill="#F2C218"/>
    <circle cx="0" cy="60" r="5.5" fill="#F2C218"/>
    <polygon points="-21,29 -42,48 -29,21" fill="#F2C218"/>
    <circle cx="-42" cy="46" r="5.5" fill="#F2C218"/>
    <polygon points="-36,5 -62,0 -36,-5" fill="#F2C218"/>
    <circle cx="-60" cy="0" r="5.5" fill="#F2C218"/>
    <polygon points="-29,-21 -48,-42 -21,-29" fill="#F2C218"/>
    <circle cx="-46" cy="-42" r="5.5" fill="#F2C218"/>
  </g>
  
  <!-- === SNOWFLAKE (front, offset left and up) === -->
  <g transform="translate(88, 92)" fill="#00B4D8" stroke="#00B4D8" stroke-width="0.5">
    <circle cx="0" cy="0" r="9"/>
    <g id="fav-arm">
      <rect x="-3" y="-56" width="6" height="56" rx="2"/>
      <line x1="0" y1="-20" x2="14" y2="-34" stroke="#00B4D8" stroke-width="5" stroke-linecap="round"/>
      <line x1="0" y1="-20" x2="-14" y2="-34" stroke="#00B4D8" stroke-width="5" stroke-linecap="round"/>
      <line x1="0" y1="-38" x2="10" y2="-48" stroke="#00B4D8" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="0" y1="-38" x2="-10" y2="-48" stroke="#00B4D8" stroke-width="4.5" stroke-linecap="round"/>
      <polygon points="0,-64 7,-56 0,-48 -7,-56"/>
    </g>
    <use href="#fav-arm" transform="rotate(60)"/>
    <use href="#fav-arm" transform="rotate(120)"/>
    <use href="#fav-arm" transform="rotate(180)"/>
    <use href="#fav-arm" transform="rotate(240)"/>
    <use href="#fav-arm" transform="rotate(300)"/>
  </g>
</svg>
