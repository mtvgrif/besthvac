<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="left-half">
      <rect x="0" y="0" width="100" height="200"/>
    </clipPath>
    <clipPath id="right-half">
      <rect x="100" y="0" width="100" height="200"/>
    </clipPath>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="88"/>
    </clipPath>
  </defs>
  
  <!-- Black circle background -->
  <circle cx="100" cy="100" r="88" fill="#0A0A0A"/>
  
  <!-- ===== LEFT SIDE: SNOWFLAKE (cyan) ===== -->
  <g clip-path="url(#circle-clip)">
    <g transform="translate(80, 100)" fill="#00B4D8" stroke="#00B4D8">
      
      <!-- Vertical main arm (top) -->
      <rect x="-4" y="-58" width="8" height="58" rx="4"/>
      <!-- Vertical main arm (bottom) -->
      <rect x="-4" y="0" width="8" height="58" rx="4"/>
      
      <!-- Top-left arm (120deg) -->
      <rect x="-4" y="-58" width="8" height="58" rx="4" transform="rotate(60)"/>
      <!-- Bottom-right arm -->
      <rect x="-4" y="0" width="8" height="58" rx="4" transform="rotate(60)"/>
      
      <!-- Top-right arm (60deg) -->
      <rect x="-4" y="-58" width="8" height="58" rx="4" transform="rotate(-60)"/>
      <!-- Bottom-left arm -->
      <rect x="-4" y="0" width="8" height="58" rx="4" transform="rotate(-60)"/>
      
      <!-- Branch pairs on vertical arm - top -->
      <line x1="0" y1="-22" x2="-18" y2="-40" stroke-width="7" stroke-linecap="round"/>
      <line x1="0" y1="-22" x2="18" y2="-40" stroke-width="7" stroke-linecap="round"/>
      <line x1="0" y1="-40" x2="-13" y2="-53" stroke-width="6" stroke-linecap="round"/>
      <line x1="0" y1="-40" x2="13" y2="-53" stroke-width="6" stroke-linecap="round"/>
      
      <!-- Branch pairs on vertical arm - bottom -->
      <line x1="0" y1="22" x2="-18" y2="40" stroke-width="7" stroke-linecap="round"/>
      <line x1="0" y1="22" x2="18" y2="40" stroke-width="7" stroke-linecap="round"/>
      <line x1="0" y1="40" x2="-13" y2="53" stroke-width="6" stroke-linecap="round"/>
      <line x1="0" y1="40" x2="13" y2="53" stroke-width="6" stroke-linecap="round"/>
      
      <!-- Branch pairs on 60deg arms -->
      <g transform="rotate(60)">
        <line x1="0" y1="-22" x2="-16" y2="-38" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="-22" x2="16" y2="-38" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="22" x2="-16" y2="38" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="22" x2="16" y2="38" stroke-width="6" stroke-linecap="round"/>
      </g>
      
      <!-- Branch pairs on -60deg arms -->
      <g transform="rotate(-60)">
        <line x1="0" y1="-22" x2="-16" y2="-38" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="-22" x2="16" y2="-38" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="22" x2="-16" y2="38" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="22" x2="16" y2="38" stroke-width="6" stroke-linecap="round"/>
      </g>
      
      <!-- Center dot -->
      <circle cx="0" cy="0" r="6" fill="#00B4D8"/>
    </g>
    
    <!-- ===== CENTER DIVIDER: two vertical cyan lines ===== -->
    <rect x="94" y="18" width="5" height="164" rx="2.5" fill="#00B4D8"/>
    <rect x="103" y="18" width="5" height="164" rx="2.5" fill="#00B4D8"/>
    
    <!-- ===== RIGHT SIDE: HALF SUN (gold/yellow) ===== -->
    <g transform="translate(120, 100)" fill="#F2C218">
      <!-- Sun half-circle body -->
      <circle cx="0" cy="0" r="34"/>
      
      <!-- Sun rays - rounded pill shapes radiating outward -->
      <!-- Ray right (3 o'clock) -->
      <rect x="38" y="-5" width="26" height="10" rx="5" fill="#F2C218"/>
      
      <!-- Ray upper-right (1:30) -->
      <rect x="38" y="-5" width="22" height="9" rx="4.5" fill="#F2C218" transform="rotate(-35)"/>
      
      <!-- Ray top-right (12:30) -->
      <rect x="38" y="-5" width="22" height="9" rx="4.5" fill="#F2C218" transform="rotate(-70)"/>
      
      <!-- Ray lower-right (4:30) -->
      <rect x="38" y="-5" width="22" height="9" rx="4.5" fill="#F2C218" transform="rotate(35)"/>
      
      <!-- Ray bottom-right (5:30) -->
      <rect x="38" y="-5" width="22" height="9" rx="4.5" fill="#F2C218" transform="rotate(70)"/>
      
      <!-- Ray top (11 o'clock) — partial, clipped by circle -->
      <rect x="38" y="-5" width="18" height="9" rx="4.5" fill="#F2C218" transform="rotate(-105)"/>
      
      <!-- Ray bottom (7 o'clock) — partial -->
      <rect x="38" y="-5" width="18" height="9" rx="4.5" fill="#F2C218" transform="rotate(105)"/>
    </g>
  </g>
</svg>
